const DUS={lat:51.29,lon:6.77};
const regionColors={"Europa":"#2563a8","Asien":"#1a9e70","Afrika":"#c0392b","Naher Osten":"#b07010","Nordamerika":"#5a42b0","Südamerika":"#903050","Karibik":"#0e6e50"};
let activeRegion="Alle";

["Alle",...Object.keys(regionColors)].forEach(r=>{
  const btn=document.createElement("button");
  btn.className="region-btn"+(r==="Alle"?" active":"");
  btn.textContent=r;
  btn.onclick=()=>{activeRegion=r;document.querySelectorAll(".region-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");redraw();};
  document.getElementById("filters").appendChild(btn);
});

const W=900,H=500;
const svg=d3.select("#map");
const zoomG=d3.select("#zoom-g");
const projection=d3.geoNaturalEarth1().scale(153).translate([W/2,H/2]);
const pathGen=d3.geoPath().projection(projection);
const zoom=d3.zoom().scaleExtent([1,20]).translateExtent([[0,0],[W,H]])
  .on("zoom",(event)=>{
    zoomG.attr("transform",event.transform);
    const k=event.transform.k,r=DOT_R/Math.sqrt(k);
    zoomG.selectAll("circle.dest").attr("r",r).attr("stroke-width",0.5/Math.sqrt(k));
    zoomG.selectAll("circle.dus-dot").attr("r",r).attr("stroke-width",1/Math.sqrt(k));
    zoomG.selectAll("line.flight").attr("stroke-width",0.6/Math.sqrt(k));
  });
svg.call(zoom);
document.getElementById("zoom-in").onclick=()=>svg.transition().duration(300).call(zoom.scaleBy,1.6);
document.getElementById("zoom-out").onclick=()=>svg.transition().duration(300).call(zoom.scaleBy,0.625);
document.getElementById("zoom-reset").onclick=()=>svg.transition().duration(400).call(zoom.transform,d3.zoomIdentity);
function ck(){return d3.zoomTransform(svg.node()).k;}

function redraw(){
  const filtered=activeRegion==="Alle"?destinations:destinations.filter(d=>d.region===activeRegion);
  d3.select("#lines").selectAll("line").remove();
  d3.select("#dots").selectAll("circle").remove();
  const tooltip=document.getElementById("tooltip");
  const src=projection([DUS.lon,DUS.lat]);
  const k=ck(),r=DOT_R/Math.sqrt(k);
  filtered.forEach(d=>{
    const dst=projection([d.lon,d.lat]);
    if(!dst)return;
    const col=regionColors[d.region]||"#2563a8";
    d3.select("#lines").append("line").attr("class","flight")
      .attr("x1",src[0]).attr("y1",src[1]).attr("x2",dst[0]).attr("y2",dst[1])
      .attr("stroke",col).attr("stroke-width",0.6/Math.sqrt(k)).attr("stroke-opacity","0.32");
    d3.select("#dots").append("circle").attr("class","dest")
      .attr("cx",dst[0]).attr("cy",dst[1]).attr("r",r)
      .attr("fill",col).attr("fill-opacity","0.85").attr("stroke","#fff").attr("stroke-width",0.5/Math.sqrt(k))
      .style("cursor","pointer")
      .on("mouseover",function(evt){
        const kr=ck();d3.select(this).attr("r",(DOT_R+1.5)/Math.sqrt(kr)).attr("fill-opacity","1");
        tooltip.style.display="block";
        tooltip.innerHTML="<strong>"+d.city+"</strong><span>"+d.country+" · "+d.region+"</span>";
        const rect=document.getElementById("map-container").getBoundingClientRect();
        tooltip.style.left=(evt.clientX-rect.left+12)+"px";tooltip.style.top=(evt.clientY-rect.top-10)+"px";
      })
      .on("mouseout",function(){d3.select(this).attr("r",DOT_R/Math.sqrt(ck())).attr("fill-opacity","0.85");tooltip.style.display="none";});
  });
}

function drawDUS(){
  const pos=projection([DUS.lon,DUS.lat]);
  if(!pos)return;
  const k=ck(),r=DOT_R/Math.sqrt(k);
  d3.select("#dus").append("circle").attr("class","dus-dot")
    .attr("cx",pos[0]).attr("cy",pos[1]).attr("r",r)
    .attr("fill","#c0392b").attr("stroke","#fff").attr("stroke-width",1/Math.sqrt(k));
}

function drawLegend(){
  const g=d3.select("#legend");
  Object.entries(regionColors).forEach(([region,color],i)=>{
    g.append("circle").attr("cx",18).attr("cy",378+i*16).attr("r",4).attr("fill",color);
    g.append("text").attr("x",28).attr("y",382+i*16).attr("font-size","10").attr("fill","#666").attr("font-family","DM Sans, sans-serif").text(region);
  });
}

Promise.all([
  d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json"),
  new Promise(res=>{
    if(window.topojson){res();return;}
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js";
    s.onload=res;document.head.appendChild(s);
  })
]).then(([world])=>{
  const countries=topojson.feature(world,world.objects.countries);
  d3.select("#countries").selectAll("path").data(countries.features).enter().append("path")
    .attr("d",pathGen).attr("fill","#ccd9e8").attr("stroke","#b0c0d0").attr("stroke-width","0.4");
  redraw();drawDUS();drawLegend();
});
