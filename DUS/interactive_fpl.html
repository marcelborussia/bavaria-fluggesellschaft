<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bavaria Flugplan 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d1b35;--blue:#2E6DB4;--sky:#4a9fd4;--gold:#e8b84b;--muted:#7a90a8;--white:#fff;--card-bg:#162440;--border:rgba(74,159,212,0.18);--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse 80% 60% at 15% -10%,rgba(46,109,180,0.25) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 85% 110%,rgba(74,159,212,0.15) 0%,transparent 60%);pointer-events:none;z-index:0}
.page-wrapper{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 24px 60px}
.site-header{display:flex;align-items:center;justify-content:space-between;padding:28px 0 20px;border-bottom:1px solid var(--border);margin-bottom:36px}
.logo-wrap img{height:56px;display:block}
.header-nav{display:flex;gap:12px;align-items:center}
.header-nav a{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.5px;text-decoration:none;transition:background .2s,border-color .2s,color .2s}
.nav-btn-map{background:rgba(74,159,212,0.12);border:1px solid rgba(74,159,212,0.35);color:var(--sky)}
.nav-btn-map:hover{background:rgba(74,159,212,0.25);border-color:var(--sky);color:var(--white)}
.nav-btn-list{background:rgba(232,184,75,0.1);border:1px solid rgba(232,184,75,0.35);color:var(--gold)}
.nav-btn-list:hover{background:rgba(232,184,75,0.22);border-color:var(--gold);color:var(--white)}
.header-title{text-align:right}
.header-title h1{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:2px;color:var(--white);line-height:1}
.filter-section{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;margin-bottom:36px;box-shadow:0 8px 40px rgba(0,0,0,0.4)}
.filter-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.filter-group{flex:1;min-width:160px}
.filter-group label,.search-group label{display:block;font-size:.72rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px}
.filter-group label{color:var(--sky)}
.search-group label{color:var(--gold)}
.filter-group select{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s,background .2s;appearance:none;cursor:pointer}
.filter-group select:focus{border-color:var(--sky);background:rgba(74,159,212,0.1)}
.filter-group select option{background:#1a2e4a;color:var(--white)}
.search-row{display:flex;gap:16px;flex-wrap:wrap}
.search-group{flex:1;min-width:180px;position:relative}
.search-group input{width:100%;padding:10px 14px 10px 38px;background:rgba(232,184,75,0.07);border:1px solid rgba(232,184,75,0.3);border-radius:8px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s,background .2s}
.search-group input:focus{border-color:var(--gold);background:rgba(232,184,75,0.12)}
.search-group input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:13px;bottom:10px;font-size:1rem;opacity:.5;pointer-events:none}
.results-meta{display:flex;align-items:center;margin-bottom:20px}
.results-count{font-size:.85rem;color:var(--muted)}
.results-count span{color:var(--sky);font-weight:700}
.flights-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.flight-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.flight-card:hover{transform:translateY(-3px);border-color:rgba(74,159,212,0.5);box-shadow:0 8px 32px rgba(46,109,180,0.3)}
.flight-card.open{border-color:var(--sky)}
.card-summary{padding:16px 18px;display:flex;align-items:center;gap:14px}
.card-info{flex:1;min-width:0}
.card-city{font-size:1.05rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-country{font-size:.78rem;color:var(--muted);margin-top:2px}
.card-iata{background:rgba(74,159,212,0.15);border:1px solid rgba(74,159,212,0.3);border-radius:6px;padding:3px 8px;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:1px;color:var(--sky);flex-shrink:0}
.card-chevron{color:var(--muted);font-size:.9rem;transition:transform .3s;flex-shrink:0}
.flight-card.open .card-chevron{transform:rotate(180deg)}
.card-detail{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(0.4,0,0.2,1)}
.flight-card.open .card-detail{max-height:400px}
.card-detail-inner{border-top:1px solid var(--border);padding:24px 18px 20px;background:rgba(0,0,0,0.2)}
.flight-viz{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px}
.plane-depart{font-size:2rem;animation:planeRoll 2s ease-in-out infinite}
.plane-arrive{font-size:2rem;animation:planeLand 2s ease-in-out infinite}
@keyframes planeRoll{0%,100%{transform:translateX(0) rotate(-5deg)}50%{transform:translateX(4px) rotate(5deg)}}
@keyframes planeLand{0%,100%{transform:translateX(0) rotate(5deg)}50%{transform:translateX(-4px) rotate(-5deg)}}
.flight-center{flex:1;text-align:center}
.flight-number-big{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:3px;color:var(--gold);line-height:1}
.flight-route{font-size:.78rem;color:var(--muted);margin-top:4px}
.flight-codes{font-size:.72rem;font-weight:700;letter-spacing:1px;color:var(--sky);margin-top:2px}
.flight-row-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px;font-weight:600}
.return-section{border-top:1px solid var(--border);padding-top:16px;margin-top:4px}
.reset-wrap{text-align:center;margin-top:40px}
.btn-reset{display:inline-block;background:transparent;border:2px solid var(--blue);color:var(--sky);font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:700;letter-spacing:1px;padding:13px 36px;border-radius:50px;cursor:pointer;transition:background .2s,color .2s,border-color .2s,transform .15s;text-transform:uppercase}
.btn-reset:hover{background:var(--blue);color:var(--white);border-color:var(--sky);transform:translateY(-2px)}
.footer-link{text-align:center;margin-top:32px;padding-top:28px;border-top:1px solid var(--border)}
.footer-link a{color:var(--sky);text-decoration:none;font-size:.88rem;letter-spacing:.5px;transition:color .2s}
.footer-link a:hover{color:var(--gold);text-decoration:underline}
.footer-link p{font-size:.75rem;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .empty-icon{font-size:3rem;margin-bottom:12px;opacity:.4}
.airport-link-wrap{display:flex;justify-content:center;margin-top:14px}
.airport-link{display:inline-flex;align-items:center;gap:6px;color:var(--sky);font-size:.8rem;font-weight:600;letter-spacing:.4px;text-decoration:none;border:1px solid rgba(74,159,212,0.3);border-radius:6px;padding:5px 11px;transition:background .2s,border-color .2s,color .2s}
.airport-link:hover{background:rgba(74,159,212,0.15);border-color:var(--sky);color:var(--white)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--navy)}::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px}
@media(max-width:600px){.site-header{flex-direction:column;gap:16px;text-align:center}.header-title{text-align:center}.filter-section{padding:20px 16px}.flights-grid{grid-template-columns:1fr}}
</style>
</head>

const countries = [...new Set(FLIGHTS.map(f => f.country))].sort();
const cs = document.getElementById('filterCountry');
countries.forEach(c => {
  const o = document.createElement('option');
  o.value = c; o.textContent = c;
  cs.appendChild(o);
});

function applyFilters() {
  const country = document.getElementById('filterCountry').value;
  const cityQ = document.getElementById('searchCity').value.trim().toLowerCase();
  const iataQ = document.getElementById('searchIata').value.trim().toUpperCase();
  const flightQ = document.getElementById('searchFlight').value.trim().toUpperCase();

  const filtered = FLIGHTS.filter(f => {
    if (country && f.country !== country) return false;
    if (cityQ && !f.city.toLowerCase().includes(cityQ)) return false;
    if (iataQ && !f.iata.includes(iataQ)) return false;
    if (flightQ && !f.fn_hin.toUpperCase().includes(flightQ) && !f.fn_rueck.toUpperCase().includes(flightQ)) return false;
    return true;
  });
  renderFlights(filtered.sort((a, b) => a.city.localeCompare(b.city, 'de')));
}

function resetFilters() {
  document.getElementById('filterCountry').value = '';
  document.getElementById('searchCity').value = '';
  document.getElementById('searchIata').value = '';
  document.getElementById('searchFlight').value = '';
  renderFlights(FLIGHTS.slice().sort((a, b) => a.city.localeCompare(b.city, 'de')));
}

function toggleCard(id) {
  const el = document.getElementById('card-' + id);
  if (!el) return;
  const isOpen = el.classList.contains('open');
  document.querySelectorAll('.flight-card.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) {
    el.classList.add('open');
    setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  }
}

function renderFlights(list) {
  const grid = document.getElementById('flightsGrid');
  const cnt = document.getElementById('resultsCount');
  cnt.innerHTML = '<span>' + list.length + '</span> Verbindung' + (list.length !== 1 ? 'en' : '') + ' gefunden';
  if (list.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">&#9992;</div><p>Keine Verbindungen gefunden.</p></div>';
    return;
  }
  grid.innerHTML = list.map((f, i) =>
    '<div class="flight-card" id="card-' + i + '" onclick="toggleCard(' + i + ')">' +
      '<div class="card-summary">' +
        '<div class="card-info">' +
          '<div class="card-city">' + f.city + '</div>' +
          '<div class="card-country">' + f.country + '</div>' +
        '</div>' +
        (f.iata ? '<div class="card-iata">' + f.iata + '</div>' : '') +
        '<div class="card-chevron">&#9660;</div>' +
      '</div>' +
      '<div class="card-detail">' +
        '<div class="card-detail-inner">' +
          '<div class="flight-row-label">Hinflug</div>' +
          '<div class="flight-viz">' +
            '<div class="plane-depart">&#128747;</div>' +
            '<div class="flight-center">' +
              '<div class="flight-number-big">' + f.fn_hin + '</div>' +
              '<div class="flight-route">D&#252;sseldorf &rarr; ' + f.city + '</div>' +
              '<div class="flight-codes">DUS &rarr; ' + (f.iata || '&ndash;') + '</div>' +
            '</div>' +
            '<div class="plane-arrive">&#128748;</div>' +
          '</div>' +
          '<div class="return-section">' +
            '<div class="flight-row-label">R&#252;ckflug</div>' +
            '<div class="flight-viz">' +
              '<div class="plane-depart">&#128747;</div>' +
              '<div class="flight-center">' +
                '<div class="flight-number-big">' + f.fn_rueck + '</div>' +
                '<div class="flight-route">' + f.city + ' &rarr; D&#252;sseldorf</div>' +
                '<div class="flight-codes">' + (f.iata || '&ndash;') + ' &rarr; DUS</div>' +
              '</div>' +
              '<div class="plane-arrive">&#128748;</div>' +
            '</div>' +
          '</div>' +
          (f.iata ? '<div class="airport-link-wrap"><a class="airport-link" href="https://opennav.com/airport/' + f.iata.toLowerCase() + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">&#9992; Airport Info ' + f.iata + ' &#8599;</a></div>' : '') +
        '</div>' +
      '</div>' +
    '</div>'
  ).join('');
}

renderFlights(FLIGHTS.slice().sort((a, b) => a.city.localeCompare(b.city, 'de')));
</script>
</body>
</html>
